version: "3.9"

# Development-time compose file. Boots the Knowledge Vault API server from
# source with live reload. The mobile app (Expo) is *not* containerized — run
# `pnpm dev:metro` on the host.
#
# Usage:
#   cp .env.example .env   # then fill in JWT_SECRET etc.
#   docker compose up --build

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kv-api
    environment:
      NODE_ENV: development
      PORT: "3000"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production-please-32}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8081}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_WEBHOOK_SECRET: ${EMAIL_WEBHOOK_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
