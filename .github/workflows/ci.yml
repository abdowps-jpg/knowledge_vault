name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type check, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Initialize database
        run: pnpm db:init
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-long-enough-for-hs256-signing
          TURSO_URL: ':memory:'
          TURSO_TOKEN: 'test'

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-long-enough-for-hs256-signing
          TURSO_URL: ':memory:'
          TURSO_TOKEN: 'test'

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (high severity)
        run: pnpm audit --audit-level high || true
        # Soft-fail for now; flip to `pnpm audit --audit-level high` (no `|| true`)
        # once known false-positives in transitive deps are triaged.
